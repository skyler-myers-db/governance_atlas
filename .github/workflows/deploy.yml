name: Deploy Governance Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "DAB target (dev | staging | prod)"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    name: Validate bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend tests
        working-directory: frontend
        run: npm run test

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Repo hygiene checks
        run: python3 scripts/validate_repo_hygiene.py

      - name: Backend compile check
        run: python3 -m py_compile run_app.py runtime_app.py govhub/api/*.py govhub/services/*.py govhub/*.py scripts/prepare_bundle.py scripts/validate_repo_hygiene.py

      - name: Backend unit tests
        run: python3 -m unittest discover -s tests

      - name: Prepare clean bundle directory
        run: python3 scripts/prepare_bundle.py --output "${RUNNER_TEMP}/governance_hub_bundle"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate packaged bundle
        working-directory: ${{ runner.temp }}/governance_hub_bundle
        run: |
          databricks bundle validate \
            -t dev \
            --var="warehouse_id=${{ secrets.DATABRICKS_WAREHOUSE_ID }}"

      - name: Summarize packaged bundle
        working-directory: ${{ runner.temp }}/governance_hub_bundle
        run: |
          databricks bundle summary \
            -t dev \
            --var="warehouse_id=${{ secrets.DATABRICKS_WAREHOUSE_ID }}"

  deploy:
    name: Deploy (${{ github.event.inputs.target || 'dev' }})
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.target || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Prepare clean bundle directory
        run: python3 scripts/prepare_bundle.py --output "${RUNNER_TEMP}/governance_hub_bundle"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Set target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy packaged bundle
        working-directory: ${{ runner.temp }}/governance_hub_bundle
        run: |
          databricks bundle deploy \
            -t "${{ steps.target.outputs.target }}" \
            --var="warehouse_id=${{ secrets.DATABRICKS_WAREHOUSE_ID }}"

      - name: Summary
        run: |
          echo "### ✅ Deployed to **${{ steps.target.outputs.target }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Bundle: governance-hub" >> "$GITHUB_STEP_SUMMARY"
          echo "Workspace: ${{ secrets.DATABRICKS_HOST }}" >> "$GITHUB_STEP_SUMMARY"
