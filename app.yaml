# Databricks App configuration — single source of truth.
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/app-config.html
#
# This file is REGENERATED by scripts/prepare_bundle.py when --target is
# supplied. The Databricks Apps platform reads env vars only from app.yaml
# in the deployed source code; the databricks_app Terraform resource has no
# config/env attribute, so values defined in databricks.yml under
# resources.apps.atlas.config.env never reach the running app via
# `databricks bundle deploy` alone. The packaging step resolves per-target
# variables via `databricks bundle validate -o json -t <target>` and bakes
# the result here, so per-target env values are honored at runtime while
# the in-repo app.yaml stays portable.
# Generated for bundle target: dev

command:
  - "python"
  - "run_app.py"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"
  - name: GOVAT_CATALOG
    value: "datapact"
  - name: GOVAT_SCHEMA
    value: "atlas"
  - name: GOVAT_DISCOVERY_CATALOGS
    value: "datapact,finance_prod,customer_360,sales_prod,product_events,hr_secure,marketing_mart"
  - name: GOVAT_ADMIN_EMAILS
    value: "skyler@entrada.ai"
  - name: GOVAT_ENVIRONMENT_LABEL
    value: "Dev - DEFAULT"
  - name: GOVAT_DEPLOY_TARGET
    value: "Dev"
  - name: GOVAT_ATLAS_AI_PROVIDER
    value: "genie"
  - name: GOVAT_GENIE_SPACE_ID
    value: "01f1406a11221afa985d3fe64c9fbea1"
  - name: GOVAT_GENIE_SPACE_TITLE
    value: "Governance Atlas Metadata Room"
  - name: GOVAT_ATLAS_AI_REQUIRE_BENCHMARK
    value: "true"
  - name: GOVAT_LAKEBASE_ENABLED
    value: "true"
  - name: GOVAT_LAKEBASE_ENDPOINT_NAME
    value: "projects/governance-atlas-state/branches/production/endpoints/primary"
  - name: GOVAT_LAKEBASE_SCHEMA
    value: "atlas_app"
  - name: GOVAT_LAKEBASE_UC_CATALOG
    value: "not-configured"
