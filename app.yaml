# Databricks App configuration — single source of truth.
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/app-config.html
command:
  - python
  - run_app.py

env:
  # ── Required ──────────────────────────────────────────────
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "uc_warehouse"

  # ── Governance Hub defaults ───────────────────────────────
  - name: GOVHUB_CATALOG
    value: main
  - name: GOVHUB_SCHEMA
    value: governance_hub
  - name: GOVHUB_ADMIN_EMAILS
    value: ""
