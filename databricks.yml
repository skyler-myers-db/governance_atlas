bundle:
  name: governance-hub

# ── Variables ──────────────────────────────────────────────
# Override per-target or via CLI: databricks bundle deploy -t prod
variables:
  warehouse_id:
    description: "SQL Warehouse ID the app uses for UC queries"
  gov_catalog:
    description: "UC catalog where governance tables are created"
    default: main
  gov_schema:
    description: "UC schema within the catalog for governance tables"
    default: governance_hub
  admin_emails:
    description: "Comma-separated bootstrap admin emails"
    default: ""
  secret_scope:
    description: "Secret scope for OpenMetadata connection secrets (set to empty to skip)"
    default: ""
  om_server_url_key:
    description: "Secret key for OpenMetadata server URL"
    default: om_server_url
  om_jwt_token_key:
    description: "Secret key for OpenMetadata JWT token"
    default: om_jwt_token

# ── App resource ────────────────────────────────────────────
resources:
  apps:
    governance_hub:
      name: governance-hub
      description: >
        Governance Hub — a self-service data governance portal extending
        Unity Catalog, deployable to any Databricks workspace.
      source_code_path: .
      resources:
        - name: uc_warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

      permissions:
        - level: CAN_USE
          group_name: users

# ── Targets (environments) ──────────────────────────────────
# Each target maps to a Databricks workspace + profile.
# `databricks bundle deploy -t <target>` selects the environment.
targets:
  dev:
    mode: development
    default: true
    variables:
      gov_catalog: dev
      gov_schema: governance_hub
    workspace:
      # Uses the DEFAULT profile in ~/.databrickscfg unless overridden
      host: ${workspace.host}

  staging:
    variables:
      gov_catalog: staging
      gov_schema: governance_hub
    workspace:
      host: ${workspace.host}

  prod:
    variables:
      gov_catalog: prod
      gov_schema: governance_hub
    workspace:
      host: ${workspace.host}
