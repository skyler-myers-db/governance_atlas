bundle:
  name: governance-hub

variables:
  app_name:
    description: "Name of the Databricks App"
    default: governance-hub
  warehouse_id:
    description: "SQL Warehouse ID the app uses for Unity Catalog queries"
  secret_scope:
    description: "Secret scope that contains OpenMetadata connection secrets"
    default: governance_hub
  om_server_url_key:
    description: "Secret key name for the OpenMetadata server URL"
    default: om_server_url
  om_jwt_token_key:
    description: "Secret key name for the OpenMetadata JWT token"
    default: om_jwt_token

resources:
  apps:
    governance_hub:
      name: ${var.app_name}
      description: "Governance Hub (Unity Catalog + OpenMetadata)"
      source_code_path: .

      # Resources injected into the app at runtime (secrets, warehouse, etc.)
      resources:
        - name: uc_warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

        - name: om_server_url
          secret:
            scope: ${var.secret_scope}
            key: ${var.om_server_url_key}
            permission: READ

        - name: om_jwt_token
          secret:
            scope: ${var.secret_scope}
            key: ${var.om_jwt_token_key}
            permission: READ

      # Example: allow all workspace users to access the app UI.
      # Adjust group_name to match your workspace conventions.
      permissions:
        - level: CAN_USE
          group_name: users

targets:
  dev:
    default: true
    # Uses the Databricks CLI configured workspace/profile host.
