# Databricks App configuration
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/app-config.html
command:
  - streamlit
  - run
  - app.py

env:
  # Databricks
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: uc_warehouse

  # DataHub (GraphQL)
  - name: DATAHUB_GMS_URL
    valueFrom: datahub_gms_url
  - name: DATAHUB_TOKEN
    valueFrom: datahub_token

  # Governance Hub config
  - name: GOVHUB_CATALOG
    value: main
  - name: GOVHUB_SCHEMA
    value: governance_hub

  # Comma-separated list of admin emails (optional bootstrap)
  - name: GOVHUB_ADMIN_EMAILS
    value: ""
